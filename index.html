<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>גלריה</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin:30px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(60px,1fr));
  gap:10px;
  width:90%;
  max-width:700px;
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  cursor:pointer;
  font-size:16px;
  transition:.2s;
}

button:hover{
  background:#444;
  transform:scale(1.05);
}

button.active{
  background:orange;
  color:black;
}

#viewer{
  margin-top:30px;
  width:90%;
  display:flex;
  justify-content:center;
}

img{
  max-width:100%;
  max-height:70vh;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,.5);
  opacity:0;
  transition:opacity .3s ease;
}

img.show{
  opacity:1;
}
</style>
</head>

<body>

<h1>גלריית תמונות</h1>

<div class="grid" id="buttons"></div>

<div id="viewer">
  <img id="mainImage">
</div>

<script>

const buttons = document.getElementById("buttons");
const mainImage = document.getElementById("mainImage");

for(let i = 1; i <= 40; i++){

  const btn = document.createElement("button");
  btn.textContent = i;

  btn.addEventListener("click", () => {

    // fade out
    mainImage.classList.remove("show");

    setTimeout(() => {
      mainImage.src = `images/${i}.png`; // ✅ PNG
      mainImage.classList.add("show");
    }, 100);

    // active button
    document.querySelectorAll("button")
      .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
  });

  buttons.appendChild(btn);
}

</script>

</body>
</html>
