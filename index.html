<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>גלריה</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: auto;
    }

    button {
      padding: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      max-width: 80%;
      display: none;
    }

    img.active {
      display: block;
    }
  </style>
</head>

<body>

<h1>גלריית תמונות</h1>

<div class="grid" id="buttons"></div>

<div id="viewer"></div>

<script>
const buttons = document.getElementById("buttons");
const viewer = document.getElementById("viewer");

for (let i = 1; i <= 40; i++) {
  const btn = document.createElement("button");
  btn.innerText = i;

  const img = document.createElement("img");
  img.src = `images/${i}.jpg`;

  viewer.appendChild(img);

  btn.onclick = () => {
    document.querySelectorAll("img").forEach(im => im.classList.remove("active"));
    img.classList.add("active");
  };

  buttons.appendChild(btn);
}
</script>

</body>
</html>
